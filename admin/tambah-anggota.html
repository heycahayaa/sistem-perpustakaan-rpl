<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tambah Anggota</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/book-management.css">
</head>

<body>

    <div class="sidebar">

        <div class="logo">
            <i class="fa-solid fa-book-open-reader"></i>
            Perpustakaan
        </div>

        <hr>

        <a href="dashboard-admin.html">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </a>

        <div class="menu-group">

            <div class="menu-toggle" onclick="toggleMenu(this,'bukuMenu')">
                <span>
                    <i class="fa-solid fa-book"></i>
                    Buku
                </span>
                <i class="fa-solid fa-chevron-down arrow"></i>
            </div>

            <div class="submenu" id="bukuMenu">
                <a href="daftar-buku.html">
                    <i class="fa-solid fa-list"></i>
                    Daftar Buku
                </a>
                <a href="tambah-buku.html">
                    <i class="fa-solid fa-plus"></i>
                    Tambah Buku
                </a>
            </div>

        </div>

        <div class="menu-group">

            <div class="menu-toggle" onclick="toggleMenu(this,'anggotaMenu')">
                <span>
                    <i class="fa-solid fa-users"></i>
                    Anggota
                </span>
                <i class="fa-solid fa-chevron-down arrow rotate"></i>
            </div>

            <div class="submenu show" id="anggotaMenu">
                <a href="daftar-anggota.html">
                    <i class="fa-solid fa-address-book"></i>
                    Daftar Anggota
                </a>
                <a href="tambah-anggota.html" class="active">
                    <i class="fa-solid fa-user-plus"></i>
                    Tambah Anggota
                </a>
            </div>

        </div>

        <div class="menu-group">

            <div class="menu-toggle" onclick="toggleMenu(this,'layananMenu')">
                <span>
                    <i class="fa-solid fa-book-open-reader"></i>
                    Layanan
                </span>
                <i class="fa-solid fa-chevron-down arrow"></i>
            </div>

            <div class="submenu" id="layananMenu">
                <a href="peminjaman.html">
                    <i class="fa-solid fa-bookmark"></i>
                    Peminjaman
                </a>
                <a href="pengembalian.html">
                    <i class="fa-solid fa-arrow-rotate-left"></i>
                    Pengembalian
                </a>
            </div>

        </div>

        <a href="#">
            <i class="fa-solid fa-file-lines"></i>
            Laporan
        </a>

        <a href="profile-admin.html">
            <i class="fa-solid fa-user"></i>
            Profil
        </a>

        <a href="../login.html">
            <i class="fa-solid fa-right-from-bracket"></i>
            Logout
        </a>

    </div>

    <div class="main">

        <div class="topbar">
            <h4 class="topbar-title">Manajemen Anggota</h4>
            <div class="profile">
                <i class="fa-solid fa-circle-user"></i>
                Admin
            </div>
        </div>

        <div class="container-fluid p-4">

            <div class="page-header">
                <div>
                    <div class="page-kicker">Formulir Pendaftaran</div>
                    <h2>Tambah Anggota Baru</h2>
                </div>
                <a href="daftar-anggota.html" class="btn btn-outline-secondary">
                    <i class="fa-solid fa-arrow-left me-2"></i> Kembali
                </a>
            </div>

            <div class="row g-4">
                
                <div class="col-lg-8">
                    <div class="card section-card p-4">
                        <form id="memberForm" class="needs-validation" novalidate>
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">ID Anggota</label>
                                    <input type="text" class="form-control" id="memberCode" placeholder="Contoh: AGT-001" required>
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label">Nama Lengkap</label>
                                    <input type="text" class="form-control" id="memberName" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" id="memberEmail" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">No. Telepon</label>
                                    <input type="text" class="form-control" id="memberPhone" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Pekerjaan/Instansi</label>
                                    <input type="text" class="form-control" id="memberJob" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Status</label>
                                    <select class="form-select" id="memberStatus">
                                        <option value="Aktif">Aktif</option>
                                        <option value="Nonaktif">Nonaktif</option>
                                    </select>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Alamat Lengkap</label>
                                    <textarea class="form-control" id="memberAddress" rows="3" required></textarea>
                                </div>
                            </div>
                            <div class="form-actions mt-4">
                                <button type="reset" class="btn btn-light border">Reset</button>
                                <button type="submit" class="btn btn-primary-custom" style="background-color: var(--primary); color: white;">
                                    <i class="fa-solid fa-floppy-disk me-2"></i> Simpan Anggota
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="card section-card p-4">
                        <h5 class="section-title">Preview Kartu</h5>
                        <div class="book-preview mt-3 text-center border p-4" style="border-radius: 15px; background-color: #f8f9fa;">
                            <div style="width: 100px; height: 100px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 15px;">
                                <i class="fa-solid fa-user"></i>
                            </div>
                            <h5 id="previewName" style="color: var(--primary); font-weight: 800;">Nama Lengkap</h5>
                            <p id="previewCode" class="text-muted mb-2">ID Anggota</p>
                            <span id="previewStatus" class="badge bg-success rounded-pill mb-3">Aktif</span>
                            <hr>
                            <div class="text-start" style="font-size: 0.9rem;">
                                <p class="mb-1"><i class="fa-solid fa-briefcase me-2 text-muted"></i> <span id="previewJob">Pekerjaan</span></p>
                                <p class="mb-1"><i class="fa-solid fa-envelope me-2 text-muted"></i> <span id="previewEmail">Email</span></p>
                                <p class="mb-0"><i class="fa-solid fa-phone me-2 text-muted"></i> <span id="previewPhone">No. Telp</span></p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/dashboard.js"></script>
    <script src="../js/member.js"></script>
</body>

</html>
