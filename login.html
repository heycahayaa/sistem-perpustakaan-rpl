<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Perpustakaan</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="overlay"></div>

    <div class="container-fluid vh-100">
        <div class="row h-100">

            <!-- LEFT SIDE -->

            <div class="col-lg-6 d-flex align-items-center">

                <div class="hero-content">

                    <i class="fa-solid fa-book-open-reader hero-icon"></i>

                    <h1>
                        Sistem Manajemen
                        <span>Perpustakaan</span>
                    </h1>

                    <p>
                        Kelola buku, anggota, peminjaman, dan pengembalian
                        secara lebih mudah, cepat, dan terorganisir.
                    </p>

                </div>

            </div>

            <!-- RIGHT SIDE -->

            <div class="col-lg-6 d-flex justify-content-center align-items-center">

                <div class="login-card">

                    <div class="text-center mb-4">

                        <div class="logo-circle">
                            <i class="fa-solid fa-building-columns"></i>
                        </div>

                        <h2>Login</h2>

                        <p>
                            Silakan login untuk mengakses sistem
                        </p>

                    </div>

                    <form id="loginForm">

                        <div class="mb-3">

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="fa-regular fa-user"></i>
                                </span>

                                <input
                                    type="text"
                                    id="username"
                                    class="form-control"
                                    placeholder="Masukkan username" 
                                    aria-label="Username" required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <div class="input-group">

                                <span class="input-group-text">
                                    <i class="fa-solid fa-lock"></i>
                                </span>

                                <input
                                    type="password"
                                    id="password"
                                    class="form-control"
                                    placeholder="Masukkan password" 
                                    aria-label="Username" required>

                                <button
                                    type="button"
                                    class="input-group-text password-toggle"
                                    onclick="togglePassword()">

                                    <i id="eyeIcon"
                                    class="fa-solid fa-eye"></i>

                                </button>

                            </div>

                        </div>

                        <div
                            id="loginError"
                            class="alert alert-danger d-none">

                            <i class="fa-solid fa-circle-exclamation"></i>
                            Username atau password salah.

                        </div>

                        <div
                            id="loginSuccess"
                            class="alert alert-success d-none">

                            <i class="fa-solid fa-circle-check"></i>
                            Login berhasil.

                        </div>

                        <button
                            type="submit"
                            class="btn login-btn w-100">

                            <i class="fa-solid fa-right-to-bracket"></i>
                            Login

                        </button>

                    </form>

                    <div class="demo-account mt-4">

                        <h6>Akun Demo</h6>

                        <small>
                            Admin :
                            admin / admin123
                        </small>

                        <br>

                        <small>
                            Anggota :
                            anggota / anggota123
                        </small>

                    </div>

                </div>

            </div>

        </div>
    </div>

    <script src="js/login.js"></script>

</body>

</html>
